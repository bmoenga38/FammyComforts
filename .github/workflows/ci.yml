name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm is pinned via the root package.json "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # postinstall runs `prisma generate` (no DB needed — Prisma 7 driver adapter).
      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  e2e:
    name: Playwright e2e (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browser (chromium)
        run: pnpm --filter @sommycomfort/web exec playwright install --with-deps chromium

      # Build once; the Playwright webServer serves this build via `next start`.
      - name: Build web
        run: pnpm --filter @sommycomfort/web build

      - name: Run e2e
        run: pnpm --filter @sommycomfort/web test:e2e
